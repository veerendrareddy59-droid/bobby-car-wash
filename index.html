<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Car Wash</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family: Arial;
margin:0;
background:#0b3d91;
color:white;
text-align:center;
}

header{
background:#021f4d;
padding:15px;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
color:black;
margin:15px;
padding:15px;
border-radius:10px;
}

.form{
background:white;
color:black;
margin:15px;
padding:15px;
border-radius:10px;
}

input,select{
width:90%;
padding:10px;
margin:8px;
border-radius:6px;
border:1px solid gray;
}

button{
padding:12px;
background:green;
color:white;
border:none;
border-radius:8px;
width:90%;
}

</style>

</head>

<body>

<header>
Car Wash  
<br>
9618532468
</header>


<div class="card">Bike ₹50</div>
<div class="card">Mini ₹200</div>
<div class="card">Sedan ₹300</div>
<div class="card">SUV ₹400</div>


<div class="form">

<h3>Book Service</h3>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone">

<input id="address" placeholder="Address">

<select id="vehicle">
<option>Bike</option>
<option>Mini Car</option>
<option>Sedan</option>
<option>SUV</option>
</select>

<button onclick="sendBooking()">
Submit Booking
</button>

</div>


<script>

function sendBooking(){

var name =
document.getElementById("name").value;

var phone =
document.getElementById("phone").value;

var address =
document.getElementById("address").value;

var vehicle =
document.getElementById("vehicle").value;

var msg =
"Car Wash Booking%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Address: "+address+"%0A"+
"Vehicle: "+vehicle;

var url =
"https://wa.me/919618532468?text="+msg;

window.open(url);

}


if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
