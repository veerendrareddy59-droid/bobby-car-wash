.bg{

/* BUTTON */

.btn{
position:absolute;

/* BUTTON POSITIONS */

}


/* BUBBLES */

.bubble{
position:fixed;
bottom:-100px;
background:rgba(255,255,255,0.4);
border-radius:50%;
animation:rise 10s infinite;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

.b1a{left:10%;width:20px;height:20px;}
.b2a{left:30%;width:15px;height:15px;}
.b3a{left:50%;width:25px;height:25px;}
