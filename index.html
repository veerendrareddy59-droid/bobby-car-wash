<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bobby Car Wash</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d91;
color:white;
text-align:center;
}

h1{
margin:10px;
}

.box{
background:white;
color:black;

}

input,select{
width:90%;

}

}

</style>

</head>

<body>

<h1>Bobby Car Wash</h1>
<p>Vijayawada</p>
<p>9618532468</p>

<div class="box">

<h3>Book Service</h3>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone">

<input id="address" placeholder="Address">

<select id="service">
<option>Bike</option>
<option>Mini</option>
<option>Sedan</option>
<option>SUV</option>
</select>

<button onclick="book()">Book Service</button>

</div>


<script>

const supabase = window.supabase.createClient(
"https://ndaxaeixfokfkldccsob.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kYXhhZWl4Zm9rZmtsZGNjc29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTk4NDQsImV4cCI6MjA4OTgzNTg0NH0.u22WXrKwg0o4n1cAxCvosg_4zlnpq08S_IQLf4ECubU"
);

async function book(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let service=document.getElementById("service").value;

const { data, error } = await supabase
.from("bookings")
.insert([
{
name:name,
phone:phone,
address:address,
service:service,
date:new Date().toString()
}
]);

if(error){

alert("Error");

}else{

alert("Booking Saved");

}

}

</script>
