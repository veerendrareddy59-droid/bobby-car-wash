<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bobby Car Wash</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b3d91,#021f4d);
color:white;
text-align:center;
}

/* HEADER */

header{
background:#001a40;
padding:15px;
}

.name{
font-size:26px;
font-weight:bold;
}

.tag{
color:yellow;
font-size:14px;
}

.loc{
color:#00ffcc;
font-size:14px;
}

/* BANNER */

.banner img{
width:100%;
height:180px;
object-fit:cover;
}

/* CARD */

.card{
background:white;
color:black;
margin:15px;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
padding:10px;
}

/* FORM */

.form{
background:white;
color:black;
margin:15px;
padding:15px;
border-radius:12px;
}

input,select{
width:90%;
padding:10px;
margin:8px;
border-radius:6px;
border:1px solid gray;
}

button{
width:90%;
padding:12px;
background:green;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

/* BUTTONS */

.bar a{
display:block;
margin:8px;
padding:12px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;
}

.call{background:#007bff;}
.wa{background:#25D366;}

</style>

</head>

<body>


<header>

<div class="name">
Bobby Car Wash
</div>

<div class="tag">
At Your Door Step
</div>

<div class="loc">
Vijayawada, Andhra Pradesh
</div>

<div>
📞 9618532468
</div>

</header>


<div class="banner">
<img src="https://images.unsplash.com/photo-1607863680198-23d4b2565df0">
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1517524008697-84bbe3c3fd98">
<h3>Bike Wash ₹50</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<h3>Mini Car ₹200</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1549924231-f129b911e442">
<h3>Sedan ₹300</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d">
<h3>SUV ₹400</h3>
</div>



<div class="form">

<h3>Book Service</h3>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone">

<input id="address" placeholder="Address">

<select id="vehicle">
<option>Bike</option>
<option>Mini Car</option>
<option>Sedan</option>
<option>SUV</option>
</select>

<button onclick="sendBooking()">
Submit Booking
</button>

</div>


<div class="bar">

<a class="call" href="tel:9618532468">
Call Now
</a>

<a class="wa"
href="https://wa.me/919618532468">
WhatsApp Booking
</a>

</div>



<script>

function sendBooking(){

var name =
document.getElementById("name").value;

var phone =
document.getElementById("phone").value;

var address =
document.getElementById("address").value;

var vehicle =
document.getElementById("vehicle").value;

var msg =
"Bobby Car Wash Booking%0A"+
"Location: Vijayawada%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Address: "+address+"%0A"+
"Vehicle: "+vehicle;

var url =
"https://wa.me/919618532468?text="+msg;

window.open(url);

}

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
